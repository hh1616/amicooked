<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile — Check button fix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: system-ui; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
  .label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #555; margin-bottom: 32px; text-align: center; }
</style>
</head>
<body>

<div class="label">MOBILE — CHECK BUTTON SCALED DOWN</div>

<div style="width: 260px; border: 2px solid #222; border-radius: 24px; overflow: hidden;">
  <div style="background: #f8f6f1; padding: 8px 0 0; text-align: center;">
    <div style="width: 80px; height: 5px; background: #e8e4dc; border-radius: 3px; margin: 0 auto;"></div>
  </div>

  <div style="background: #f8f6f1; padding: 24px 20px 60px; min-height: 480px; display: flex; flex-direction: column; justify-content: center; position: relative;">
    <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 20px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #999;">
      <span style="width: 6px; height: 6px; background: #ff0000; border-radius: 50%; display: inline-block;"></span>
      LIVE
    </div>

    <div style="font-family: 'Barlow', sans-serif; font-weight: 900; font-size: 52px; color: #000; line-height: 1; letter-spacing: -1px; text-transform: uppercase; margin-left: -2px; margin-bottom: 8px;">
      Am I<br>Cooked?
    </div>

    <p style="font-family: 'Space Mono', monospace; font-size: 11px; color: #888; margin-bottom: 28px; line-height: 1.6;">
      find out if AI is coming<br>for your job.
    </p>

    <div style="margin-bottom: 10px;">
      <div style="font-family: 'Space Mono', monospace; font-size: 12px; padding: 14px 16px; border: 3px solid #000; background: #fff; color: #bbb;">enter your job title</div>
      <div style="font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 900; padding: 13px; background: #000; color: #fff; text-align: center; letter-spacing: 1px; text-transform: uppercase; border: 3px solid #000; border-top: 0;">Check →</div>
    </div>

    <div style="font-family: 'Space Mono', monospace; font-size: 9px; color: #bbb; letter-spacing: 1px;">200+ JOBS · MARCH 2026</div>

    <div style="position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 10px 16px; font-family: 'Space Mono', monospace; font-size: 8px; color: #ccc; letter-spacing: 1px; border-top: 1px solid #e8e4dc;">
      <span>AMICOOKED.COM</span>
      <span>NO BS</span>
    </div>
  </div>

  <div style="background: #f8f6f1; padding: 8px 0; text-align: center;">
    <div style="width: 100px; height: 4px; background: #000; border-radius: 2px; margin: 0 auto; opacity: 0.2;"></div>
  </div>
</div>

</body>
</html>
